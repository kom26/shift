<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>シフト管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--bg:#ffffff;--bg-panel:#f9f8f5;--bg-muted:#f0efe9;--text:#18180f;--text-muted:#8a8880;--border:#e6e4dc;--hover:#f0efe9;--accent:#4f46e5;--accent-soft:#eef2ff;}
@media(prefers-color-scheme:dark){:root{--bg:#18180f;--bg-panel:#201f16;--bg-muted:#28271e;--text:#eae8de;--text-muted:#6b6a60;--border:#2e2d24;--hover:#28271e;--accent:#818cf8;--accent-soft:#1e1d3a;}}
*{box-sizing:border-box;}html,body,#root{height:100%;margin:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP','YuGothic',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
input[type="date"]::-webkit-calendar-picker-indicator{opacity:.5;cursor:pointer;}
input[type="color"]{appearance:none;padding:0;border:none;}input[type="color"]::-webkit-color-swatch-wrapper{padding:0;}input[type="color"]::-webkit-color-swatch{border:none;border-radius:50%;}
select{cursor:pointer;}
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:0.85;transform:scale(1.05);transition:none;}
/* モバイル：長押し時の選択・拡大・コールアウトを無効化 */
[data-date],[data-unplaced]{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.touch-chip{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;touch-action:none;}

#error-box{position:fixed;bottom:0;left:0;right:0;background:#ff0;color:#000;padding:10px;font-size:12px;z-index:99999;max-height:200px;overflow-y:auto;display:none;}
</style>

</head>
<body>
<div id="root"><p style="padding:20px">読み込み中...</p></div>
<div id="error-box"></div>
<script>
window.onerror=function(msg,src,line,col,err){
  var box=document.getElementById('error-box');
  box.style.display='block';
  box.innerHTML+='<b>ERROR:</b> '+msg+' (line '+line+')<br>';
  return false;
};
window.addEventListener('unhandledrejection',function(e){
  var box=document.getElementById('error-box');
  box.style.display='block';
  box.innerHTML+='<b>PROMISE:</b> '+e.reason+'<br>';
});
</script>
